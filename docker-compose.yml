services:
  mongodb:
    image: mongo:6.0
    container_name: financial_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: senha123
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init/keyfile/mongodb-keyfile:/etc/mongo-keyfile
      - ./mongo-init/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh
    entrypoint: [ "bash", "/usr/local/bin/docker-entrypoint.sh" ]

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "admin", "-p", "senha123", "--authenticationDatabase", "admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  data-generator:
    build: .
    env_file: .env
    container_name: data_generator_container
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./scripts:/app/scripts
      - ./data/datasets:/app/datasets
    environment:
      MONGO_URI: "mongodb://admin:senha123@mongodb:27017/?replicaSet=rs0&authSource=admin"
    command: ["tail", "-f", "/dev/null"]

  mongo-express:
    image: mongo-express
    container_name: mongo_express
    ports:
    - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: senha123
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: senha123
      ME_CONFIG_MONGODB_URL: mongodb://admin:senha123@mongodb:27017/?authSource=admin&replicaSet=rs0
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
