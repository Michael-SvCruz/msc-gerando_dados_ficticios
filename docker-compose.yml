services:
  mongodb:
    build:
      context: .
      dockerfile: Dockerfile.mongo
    container_name: financial_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
      - ./mongodb-keyfile:/etc/mongo-keyfile  # Simplificando o caminho
    # Remover o volume do entrypoint, pois ele será copiado pelo Dockerfile
    healthcheck:
      test: >
        mongosh admin 
        -u "${MONGO_INITDB_ROOT_USERNAME}" 
        -p "${MONGO_INITDB_ROOT_PASSWORD}" 
        --eval "
          if (rs.status().ok) {
            quit(0);
          } else {
            quit(1);
          }
        "
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s  # Tempo inicial para o container estar pronto

  data-generator:
    build: .
    env_file: .env
    container_name: data_generator_container
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./scripts:/app/scripts
      - ./data/datasets:/app/datasets
    environment:
      MONGO_URI: ${MONGO_URI}
    command: ["tail", "-f", "/dev/null"]

  mongo-express:
    image: mongo-express
    container_name: mongo_express
    ports:
    - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD}
      ME_CONFIG_MONGODB_URL: ${MONGO_URI}
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
