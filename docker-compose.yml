services:
  mongodb:
    build:
      context: .
      dockerfile: Dockerfile.mongo
    container_name: financial_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init/keyfile/mongodb-keyfile:/etc/mongo-keyfile
      - ./mongo-init/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh
    entrypoint: [ "bash", "/usr/local/bin/docker-entrypoint.sh" ]

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "${MONGO_INITDB_ROOT_USERNAME}", "-p", "${MONGO_INITDB_ROOT_PASSWORD}", "--authenticationDatabase", "admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  data-generator:
    build: .
    env_file: .env
    container_name: data_generator_container
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./scripts:/app/scripts
      - ./data/datasets:/app/datasets
    environment:
      MONGO_URI: ${MONGO_URI}
    command: ["tail", "-f", "/dev/null"]

  mongo-express:
    image: mongo-express
    container_name: mongo_express
    ports:
    - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${ME_CONFIG_MONGODB_ADMINUSERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${ME_CONFIG_MONGODB_ADMINPASSWORD}
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD}
      ME_CONFIG_MONGODB_URL: ${ME_CONFIG_MONGODB_URL}
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
